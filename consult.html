<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>個別相談 | 南高校.com</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif; background: #f0f0f0; color: #333; }
  .site-header { background: #fff; border-bottom: 3px solid #00a99d; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; }
  .site-title { font-size: 1.4rem; font-weight: 900; color: #00a99d; letter-spacing: -.5px; }
  .site-title span { color: #f05a28; }
  .header-btns { display: flex; }
  .header-btn { padding: 10px 14px; font-size: .78rem; font-weight: 700; color: #fff; border: none; text-align: center; flex: 1; text-decoration: none; display: flex; align-items: center; justify-content: center; transition: opacity .15s; cursor: pointer; }
  .header-btn:hover { opacity: .85; }
  .btn-orange { background: #f05a28; } .btn-blue { background: #1a6ab8; } .btn-red { background: #e0001b; } .btn-teal { background: #00a99d; }
  .container { max-width: 700px; margin: 0 auto; background: #fff; }
  .page-hero { background: linear-gradient(135deg, #1a6ab8 0%, #0d4f9e 100%); color: #fff; padding: 32px 20px; text-align: center; }
  .page-hero h1 { font-size: 1.5rem; font-weight: 900; margin-bottom: 8px; }
  .page-hero p { font-size: .9rem; opacity: .92; }
  .back-link-wrap { padding: 12px 14px; }
  .back-link { display: inline-block; padding: 6px 14px; background: #00a99d; color: #fff; border-radius: 20px; font-size: .8rem; font-weight: 700; text-decoration: none; }
  .back-link:hover { opacity: .8; }
  .features { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 16px; }
  .feature-item { background: #f0f7ff; border: 1.5px solid #bed4f0; border-radius: 8px; padding: 14px 10px; text-align: center; }
  .feature-icon { font-size: 1.6rem; margin-bottom: 6px; }
  .feature-title { font-size: .78rem; font-weight: 700; color: #1a6ab8; }
  .form-section { padding: 16px 16px 20px; }
  .form-section h2 { font-size: 1rem; font-weight: 700; color: #1a6ab8; border-left: 4px solid #1a6ab8; padding-left: 10px; margin-bottom: 16px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: .8rem; font-weight: 700; color: #555; margin-bottom: 4px; }
  .field input, .field select, .field textarea { width: 100%; padding: 9px 11px; border: 1.5px solid #ccc; border-radius: 5px; font-size: .88rem; font-family: inherit; background: #fff; }
  .field input:focus, .field select:focus { outline: none; border-color: #1a6ab8; }
  .field textarea { resize: vertical; min-height: 80px; }
  .required { color: #e0001b; font-size: .75rem; margin-left: 4px; }
  .time-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .time-btn { padding: 8px; border: 1.5px solid #1a6ab8; border-radius: 5px; background: #fff; color: #1a6ab8; font-size: .78rem; font-weight: 700; cursor: pointer; font-family: inherit; text-align: center; }
  .time-btn.selected { background: #1a6ab8; color: #fff; }
  .submit-btn { width: 100%; padding: 14px; background: #1a6ab8; color: #fff; border: none; border-radius: 8px; font-size: 1rem; font-weight: 900; cursor: pointer; font-family: inherit; margin-top: 8px; letter-spacing: 1px; }
  .submit-btn:hover { background: #0d4f9e; }
  .footer-arrow { text-align: right; padding: 8px 12px; border-top: 1px solid #e0e0e0; }
  .arrow-btn { display: inline-block; background: #888; color: #fff; width: 32px; height: 32px; border-radius: 50%; font-size: 1rem; line-height: 32px; text-align: center; cursor: pointer; border: none; }
</style>
</head>
<body>
<div class="site-header">
  <div class="site-title">南高校<span>.</span>com</div>
  <div style="font-size:.7rem;color:#888">予備校・大学受験</div>
</div>
<div class="header-btns">
  <a href="request.html"  class="header-btn btn-orange">資料請求▶</a>
  <a href="consult.html"  class="header-btn btn-blue">個別相談▶</a>
  <a href="trial.html"    class="header-btn btn-red">今すぐ体験▶</a>
  <a href="about.html"    class="header-btn btn-teal">もっと知りたい▶</a>
</div>
<div class="container">
  <div class="page-hero">
    <h1>💬 個別相談</h1>
    <p>受験のプロが、あなたの悩みに<br>一対一で丁寧にお答えします。</p>
  </div>
  <div class="back-link-wrap"><a href="index.html" class="back-link">← 講師トップへ</a></div>
  <div class="features">
    <div class="feature-item"><div class="feature-icon">🆓</div><div class="feature-title">完全無料</div></div>
    <div class="feature-item"><div class="feature-icon">⏱️</div><div class="feature-title">60分まで</div></div>
    <div class="feature-item"><div class="feature-icon">📱</div><div class="feature-title">オンライン対応</div></div>
  </div>
  <div class="form-section">
    <h2>相談予約フォーム</h2>
    <div class="field">
      <label>お名前 <span class="required">必須</span></label>
      <input type="text" placeholder="山田 太郎">
    </div>
    <div class="field">
      <label>学年 <span class="required">必須</span></label>
      <select>
        <option value="">選択してください</option>
        <option>高校1年生</option><option>高校2年生</option>
        <option>高校3年生</option><option>既卒（浪人生）</option><option>保護者</option>
      </select>
    </div>
    <div class="field">
      <label>メールアドレス <span class="required">必須</span></label>
      <input type="email" placeholder="example@email.com">
    </div>
    <div class="field">
      <label>電話番号</label>
      <input type="tel" placeholder="090-0000-0000">
    </div>
    <div class="field">
      <label>相談方法 <span class="required">必須</span></label>
      <select>
        <option value="">選択してください</option>
        <option>オンライン（Zoom）</option>
        <option>校舎（来校）</option>
        <option>電話</option>
      </select>
    </div>
    <div class="field">
      <label>ご希望の日時</label>
      <input type="date">
    </div>
    <div class="field">
      <label>ご希望の時間帯</label>
      <div class="time-grid" id="time-grid">
        <button class="time-btn" onclick="selectTime(this)">午前（10〜12時）</button>
        <button class="time-btn" onclick="selectTime(this)">昼（12〜14時）</button>
        <button class="time-btn" onclick="selectTime(this)">午後（14〜17時）</button>
        <button class="time-btn" onclick="selectTime(this)">夕方（17〜19時）</button>
        <button class="time-btn" onclick="selectTime(this)">夜（19〜21時）</button>
        <button class="time-btn" onclick="selectTime(this)">いつでも可</button>
      </div>
    </div>
    <div class="field">
      <label>相談内容・ご質問</label>
      <textarea placeholder="志望校のこと、勉強法のこと、学費のことなど、なんでもお気軽に。"></textarea>
    </div>
    <button class="submit-btn" onclick="alert('ご予約ありがとうございます！\n担当者よりご連絡いたします。')">予約を申し込む</button>
  </div>
  <div class="footer-arrow"><button class="arrow-btn" onclick="window.scrollTo({top:0,behavior:'smooth'})">▲</button></div>
</div>
<script>
function selectTime(btn) {
  document.querySelectorAll('.time-btn').forEach(function(b) { b.classList.remove('selected'); });
  btn.classList.add('selected');
}
</script>
</body>
</html>

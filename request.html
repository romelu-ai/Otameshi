<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>資料請求 | 南高校.com</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif; background: #f0f0f0; color: #333; }
  .site-header { background: #fff; border-bottom: 3px solid #00a99d; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; }
  .site-title { font-size: 1.4rem; font-weight: 900; color: #00a99d; letter-spacing: -.5px; }
  .site-title span { color: #f05a28; }
  .header-btns { display: flex; }
  .header-btn { padding: 10px 14px; font-size: .78rem; font-weight: 700; color: #fff; border: none; text-align: center; flex: 1; text-decoration: none; display: flex; align-items: center; justify-content: center; transition: opacity .15s; cursor: pointer; }
  .header-btn:hover { opacity: .85; }
  .btn-orange { background: #f05a28; } .btn-blue { background: #1a6ab8; } .btn-red { background: #e0001b; } .btn-teal { background: #00a99d; }
  .container { max-width: 700px; margin: 0 auto; background: #fff; }
  .page-hero { background: linear-gradient(135deg, #f05a28 0%, #e03318 100%); color: #fff; padding: 32px 20px; text-align: center; }
  .page-hero h1 { font-size: 1.5rem; font-weight: 900; margin-bottom: 8px; }
  .page-hero p { font-size: .9rem; opacity: .92; }
  .back-link-wrap { padding: 12px 14px; }
  .back-link { display: inline-block; padding: 6px 14px; background: #00a99d; color: #fff; border-radius: 20px; font-size: .8rem; font-weight: 700; text-decoration: none; }
  .back-link:hover { opacity: .8; }
  .form-section { padding: 20px 16px; }
  .form-section h2 { font-size: 1rem; font-weight: 700; color: #f05a28; border-left: 4px solid #f05a28; padding-left: 10px; margin-bottom: 16px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: .8rem; font-weight: 700; color: #555; margin-bottom: 4px; }
  .field input, .field select, .field textarea { width: 100%; padding: 9px 11px; border: 1.5px solid #ccc; border-radius: 5px; font-size: .88rem; font-family: inherit; background: #fff; }
  .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: #f05a28; }
  .field textarea { resize: vertical; min-height: 80px; }
  .required { color: #e0001b; font-size: .75rem; margin-left: 4px; }
  .submit-btn { width: 100%; padding: 14px; background: #f05a28; color: #fff; border: none; border-radius: 8px; font-size: 1rem; font-weight: 900; cursor: pointer; font-family: inherit; margin-top: 8px; letter-spacing: 1px; }
  .submit-btn:hover { background: #d44a1a; }
  .info-box { background: #fff5f2; border: 1.5px solid #f05a28; border-radius: 6px; padding: 14px; margin: 16px 0; font-size: .82rem; line-height: 1.7; color: #555; }
  .footer-arrow { text-align: right; padding: 8px 12px; border-top: 1px solid #e0e0e0; }
  .arrow-btn { display: inline-block; background: #888; color: #fff; width: 32px; height: 32px; border-radius: 50%; font-size: 1rem; line-height: 32px; text-align: center; cursor: pointer; border: none; }
</style>
</head>
<body>
<div class="site-header">
  <div class="site-title">南高校<span>.</span>com</div>
  <div style="font-size:.7rem;color:#888">予備校・大学受験</div>
</div>
<div class="header-btns">
  <a href="request.html"  class="header-btn btn-orange">資料請求▶</a>
  <a href="consult.html"  class="header-btn btn-blue">個別相談▶</a>
  <a href="trial.html"    class="header-btn btn-red">今すぐ体験▶</a>
  <a href="about.html"    class="header-btn btn-teal">もっと知りたい▶</a>
</div>
<div class="container">
  <div class="page-hero">
    <h1>📄 資料請求</h1>
    <p>南高校.comの詳しいパンフレットを<br>無料でお送りします。</p>
  </div>
  <div class="back-link-wrap"><a href="index.html" class="back-link">← 講師トップへ</a></div>
  <div class="form-section">
    <h2>お申し込みフォーム</h2>
    <div class="info-box">
      📬 入力いただいたご住所へ、2〜3営業日以内に資料をお送りします。<br>
      資料は完全無料・しつこい勧誘は一切ありません。
    </div>
    <div class="field">
      <label>お名前 <span class="required">必須</span></label>
      <input type="text" placeholder="山田 太郎">
    </div>
    <div class="field">
      <label>フリガナ <span class="required">必須</span></label>
      <input type="text" placeholder="ヤマダ タロウ">
    </div>
    <div class="field">
      <label>学年 <span class="required">必須</span></label>
      <select>
        <option value="">選択してください</option>
        <option>高校1年生</option>
        <option>高校2年生</option>
        <option>高校3年生</option>
        <option>既卒（浪人生）</option>
        <option>保護者</option>
      </select>
    </div>
    <div class="field">
      <label>メールアドレス <span class="required">必須</span></label>
      <input type="email" placeholder="example@email.com">
    </div>
    <div class="field">
      <label>電話番号</label>
      <input type="tel" placeholder="090-0000-0000">
    </div>
    <div class="field">
      <label>郵便番号 <span class="required">必須</span></label>
      <input type="text" placeholder="000-0000">
    </div>
    <div class="field">
      <label>ご住所 <span class="required">必須</span></label>
      <textarea placeholder="東京都○○区○○1-2-3"></textarea>
    </div>
    <div class="field">
      <label>ご質問・ご要望</label>
      <textarea placeholder="自由にご記入ください。"></textarea>
    </div>
    <button class="submit-btn" onclick="alert('ご請求ありがとうございます！\n資料をお送りします。')">資料を請求する</button>
  </div>
  <div class="footer-arrow"><button class="arrow-btn" onclick="window.scrollTo({top:0,behavior:'smooth'})">▲</button></div>
</div>
</body>
</html>

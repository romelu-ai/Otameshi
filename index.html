<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;background:#f0f0f0;color:#333}
.site-header{background:#fff;border-bottom:3px solid #00a99d;padding:10px 16px;display:flex;align-items:center;justify-content:space-between}
.site-title{font-size:1.4rem;font-weight:900;color:#00a99d}
.site-title span{color:#f05a28}
.header-btns{display:flex}
.hbtn{padding:10px 12px;font-size:.76rem;font-weight:700;color:#fff;border:none;text-align:center;flex:1;text-decoration:none;display:block}
.h-or{background:#f05a28}.h-bl{background:#1a6ab8}.h-re{background:#e0001b}.h-tl{background:#00a99d}
.container{max-width:700px;margin:0 auto;background:#fff}
.teacher-bar{background:#00a99d;color:#fff;display:flex;justify-content:space-between;align-items:center;padding:8px 12px;font-size:.95rem;font-weight:700;margin-top:10px}
.teacher-card{border:2px solid #00a99d;margin-bottom:12px;background:#fff}
.teacher-info{display:flex;align-items:center;gap:12px;padding:10px 12px;border-bottom:1px solid #e0e0e0}
.teacher-photo{width:64px;height:64px;flex-shrink:0;background:#ddd;border:1px solid #ccc;display:flex;align-items:center;justify-content:center;color:#999;font-size:.7rem;overflow:hidden}
.teacher-photo img{width:100%;height:100%;object-fit:cover;display:block}
.catchcopy{font-size:.82rem;line-height:1.6}
.video-wrap{position:relative;width:100%;padding-top:56.25%;background:#222;overflow:hidden}
.video-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.video-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff}
.video-title{background:rgba(0,0,0,.6);padding:6px 12px;font-size:.85rem;font-weight:700;margin-bottom:14px;text-align:center;width:100%}
.play-btn{width:64px;height:64px;background:#f00;border-radius:14px;display:flex;align-items:center;justify-content:center;text-decoration:none}
.play-btn::after{content:'';border-style:solid;border-width:14px 0 14px 26px;border-color:transparent transparent transparent #fff;margin-left:4px}
.video-label{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.6);color:#fff;font-size:.75rem;padding:5px 10px;display:flex;justify-content:space-between;align-items:center}
.name-lg{font-size:1.3rem;font-weight:900}
.yt-badge{display:flex;align-items:center;gap:4px;font-size:.72rem}
.yt-icon{background:#f00;color:#fff;font-size:.6rem;padding:2px 5px;border-radius:3px;font-weight:700}
.bio{padding:16px 14px;font-size:.88rem;line-height:1.85;border-top:1px solid #e0e0e0;white-space:pre-wrap}
.other-section{background:#00a99d;color:#fff;font-size:.85rem;font-weight:700;padding:7px 12px;margin-top:10px}
.other-teachers{display:flex;gap:8px;padding:10px 12px;overflow-x:auto;background:#fff;border-top:1px solid #e0e0e0;min-height:88px;align-items:flex-start}
.o-btn{flex-shrink:0;width:64px;text-align:center;border:none;background:none;padding:0;cursor:pointer}
.o-avatar{width:60px;height:60px;border-radius:50%;border:2px solid #ccc;overflow:hidden;background:#ddd;margin:0 auto 4px;display:flex;align-items:center;justify-content:center;font-size:.65rem;color:#999}
.o-avatar img{width:100%;height:100%;object-fit:cover;display:block}
.o-lbl{font-size:.65rem;color:#333;line-height:1.2}
.footer-arrow{text-align:right;padding:8px 12px;background:#fff;border-top:1px solid #e0e0e0}
.up-btn{background:#888;color:#fff;width:32px;height:32px;border-radius:50%;font-size:1rem;line-height:32px;text-align:center;cursor:pointer;border:none}

/* 編集パネル */
.edit-section{border-top:3px solid #1a6ab8;margin-top:4px}
.et-btn{width:100%;background:#1a6ab8;color:#fff;border:none;padding:14px 16px;font-size:1rem;font-weight:700;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-family:inherit;-webkit-appearance:none;border-radius:0}
.et-panel{background:#f7f9fb;padding:20px 16px}
.tab-bar{display:flex;border-bottom:2px solid #1a6ab8;margin-bottom:16px}
.tab-btn{padding:9px 14px;font-size:.8rem;font-weight:700;cursor:pointer;border:none;background:none;color:#888;font-family:inherit;border-bottom:3px solid transparent;margin-bottom:-2px;-webkit-appearance:none}
.tab-btn.on{color:#1a6ab8;border-bottom-color:#1a6ab8}
.tab-c{display:none}
.tab-c.on{display:block}
.field{margin-bottom:12px}
.field label{display:block;font-size:.76rem;font-weight:700;color:#555;margin-bottom:3px}
.field input,.field textarea{width:100%;padding:8px 10px;border:1px solid #c0c0c0;border-radius:4px;font-size:.84rem;font-family:inherit;background:#fff;-webkit-appearance:none}
.field textarea{resize:vertical;min-height:75px}
.field input[type=file]{padding:4px}
.abtn{width:100%;padding:12px;border:none;border-radius:6px;font-size:.92rem;font-weight:700;cursor:pointer;margin-top:6px;font-family:inherit;color:#fff;-webkit-appearance:none;display:block}
.abtn-or{background:#f05a28}.abtn-tl{background:#00a99d}.abtn-dk{background:#333}
.om-item{background:#fff;border:1px solid #ddd;border-radius:6px;padding:8px 10px;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.om-av{width:40px;height:40px;border-radius:50%;border:2px solid #ccc;overflow:hidden;background:#eee;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.6rem;color:#999}
.om-av img{width:100%;height:100%;object-fit:cover;display:block}
.om-info{flex:1;font-size:.78rem}
.om-info b{font-size:.82rem;display:block}
.om-info s{color:#00a99d;font-weight:700;font-style:normal}
.del-btn{background:none;border:1px solid #e00;color:#e00;border-radius:4px;font-size:.7rem;padding:3px 7px;cursor:pointer;font-family:inherit;flex-shrink:0}
.add-box{background:#fff;border:1px solid #ddd;border-radius:6px;padding:12px;margin-top:4px}
.add-box h3{font-size:.8rem;color:#555;margin-bottom:10px;font-weight:700}
.save-note{font-size:.7rem;color:#888;text-align:center;margin-top:5px}
</style>

</head>

<script>
var S={name:'',subj:'',cc:'',vt:'',bio:'',ps:'',ts:'',urls:{shiryo:'',kobetsu:'',taiken:'',motto:'',video:''},others:[]};

function ST(id,el){
  var cs=document.querySelectorAll('.tab-c');
  for(var i=0;i<cs.length;i++) cs[i].className='tab-c';
  document.getElementById(id).className='tab-c on';
  var bs=document.querySelectorAll('.tab-btn');
  for(var j=0;j<bs.length;j++) bs[j].className='tab-btn';
  el.className='tab-btn on';
}

function AM(){
  S.name=document.getElementById('in-name').value||'先生名';
  S.subj=document.getElementById('in-subj').value||'教科';
  S.cc=document.getElementById('in-cc').value;
  S.vt=document.getElementById('in-vt').value;
  S.bio=document.getElementById('in-bio').value;
  document.getElementById('d-name').textContent=S.name;
  document.getElementById('d-namelg').textContent=S.name.replace(/\s*先生\s*$/,'');
  document.getElementById('d-subj').textContent='[ '+S.subj+' ]';
  document.getElementById('d-cc').innerHTML=S.cc.replace(/\n/g,'<br>');
  document.getElementById('d-vt').textContent=S.vt;
  document.getElementById('d-bio').textContent=S.bio;
  var pf=document.getElementById('in-photo').files[0];
  if(pf){var r=new FileReader();r.onload=function(e){S.ps=e.target.result;var i=document.getElementById('d-photo');i.src=S.ps;i.style.display='block';document.getElementById('d-photo-ph').style.display='none';};r.readAsDataURL(pf);}
  var tf=document.getElementById('in-thumb').files[0];
  if(tf){var r2=new FileReader();r2.onload=function(e){S.ts=e.target.result;var t=document.getElementById('d-thumb');t.src=S.ts;t.style.display='block';};r2.readAsDataURL(tf);}
}

function AL(){
  S.urls.shiryo=document.getElementById('url-shiryo').value;
  S.urls.kobetsu=document.getElementById('url-kobetsu').value;
  S.urls.taiken=document.getElementById('url-taiken').value;
  S.urls.motto=document.getElementById('url-motto').value;
  S.urls.video=document.getElementById('url-video').value;
  document.getElementById('a-shiryo').href=S.urls.shiryo||'#';
  document.getElementById('a-kobetsu').href=S.urls.kobetsu||'#';
  document.getElementById('a-taiken').href=S.urls.taiken||'#';
  document.getElementById('a-motto').href=S.urls.motto||'#';
  document.getElementById('a-video').href=S.urls.video||'#';
}

function AO(){
  var name=document.getElementById('add-name').value.trim();
  var subj=document.getElementById('add-subj').value.trim();
  var url=document.getElementById('add-url').value.trim();
  var file=document.getElementById('add-photo').files[0];
  if(!name){document.getElementById('add-name').style.border='2px solid red';return;}
  document.getElementById('add-name').style.border='';
  function fin(src){
    S.others.push({name:name,subj:subj,url:url,src:src});
    RO();
    document.getElementById('add-name').value='';
    document.getElementById('add-subj').value='';
    document.getElementById('add-url').value='';
    document.getElementById('add-photo').value='';
  }
  if(file){var r=new FileReader();r.onload=function(e){fin(e.target.result);};r.readAsDataURL(file);}
  else fin('');
}

function DO(i){S.others.splice(i,1);RO();}

function RO(){
  var list=document.getElementById('om-list');
  list.innerHTML='';
  for(var i=0;i<S.others.length;i++){
    var o=S.others[i];
    var d=document.createElement('div');d.className='om-item';
    d.innerHTML='<div class="om-av">'+(o.src?'<img src="'+o.src+'">':"写真")+'</div>'+
      '<div class="om-info"><b>'+o.name+'</b><s>'+o.subj+'</s></div>'+
      '<button class="del-btn" onclick="DO('+i+')">削除</button>';
    list.appendChild(d);
  }
  var disp=document.getElementById('d-others');
  if(!S.others.length){disp.innerHTML='<div style="color:#aaa;font-size:.8rem;padding:8px 0">（講師を追加してください）</div>';return;}
  disp.innerHTML='';
  for(var j=0;j<S.others.length;j++){
    var o2=S.others[j];
    var b=document.createElement('button');b.className='o-btn';
    var ou=o2.url;
    b.setAttribute('onclick',"if('"+ou+"')window.open('"+ou+"','_blank')");
    b.innerHTML='<div class="o-avatar">'+(o2.src?'<img src="'+o2.src+'">':"写真")+'</div>'+
      '<div class="o-lbl">'+o2.name.replace(/\s*先生\s*$/,'')+'<br>'+(o2.subj?'<span style="color:#00a99d;font-size:.58rem">'+o2.subj+'</span>':'')+'</div>';
    disp.appendChild(b);
  }
}

function SP(){
  var css=document.querySelector('style').textContent;
  var oh='';
  for(var i=0;i<S.others.length;i++){
    var o=S.others[i];
    oh+='<a class="o-btn" href="'+o.url+'" target="_blank" style="text-decoration:none">'+
      '<div class="o-avatar">'+(o.src?'<img src="'+o.src+'">':"写真")+'</div>'+
      '<div class="o-lbl">'+o.name.replace(/\s*先生\s*$/,'')+(o.subj?'<br><span style="color:#00a99d;font-size:.58rem">'+o.subj+'</span>':'')+'</div></a>';
  }
  if(!oh) oh='<div style="color:#aaa;font-size:.8rem;padding:8px 0">（講師なし）</div>';
  var html='<!DOCTYPE html>\n<html lang="ja">\n<head>\n<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width,initial-scale=1.0">\n<title>'+S.name+' 講師紹介</title>\n<style>'+css+'</style>\n</head>\n<body>\n'+
